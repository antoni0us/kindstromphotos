<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Kindström Photos</title>
    <meta name="description" content="Flygfotografi portfolio av Anton Kindström.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Sticky Navigation (Swedish) -->
    <header class="site-header">
        <div class="logo">KINDSTRÖM<span>PHOTOS</span></div>
        <nav class="site-nav">
            <a href="/sv">Hem</a>
            <a href="/portfolio-sv" style="color: var(--text-muted);">Portfolio</a> <!-- Active Page Indicator -->
            <a href="/sv#about">Om mig</a>
            <a href="/sv#contact">Kontakt</a>
            
            <!-- Language Toggle -->
            <div class="lang-toggle">
                <a href="/portfolio" class="lang-link">🇬🇧 EN</a>
                <span class="active-lang" style="margin-left: 8px;">🇸🇪 SV</span>
            </div>
        </nav>
    </header>

    <main>
        <!-- Expanded Gallery Grid -->
        <section class="gallery-container" style="padding-top: 12vw;"> 
            <div class="gallery-grid">
                <!-- Massive Full-Width Feature -->
                <div class="gallery-item span-12 cinematic">
                    <span class="placeholder-text">Filmatisk bredbild</span>
                </div>
                
                <div class="gallery-item span-8 landscape">
                    <span class="placeholder-text">Landskapsbild</span>
                </div>
                <div class="gallery-item span-4 portrait">
                    <span class="placeholder-text">Porträttbild</span>
                </div>
                
                <div class="gallery-item span-4 portrait">
                    <span class="placeholder-text">Porträttbild</span>
                </div>
                <div class="gallery-item span-8 landscape">
                    <span class="placeholder-text">Landskapsbild</span>
                </div>
            </div>
        </section>
    </main>

    <footer id="contact" class="site-footer">
        <div class="footer-content">
            <h2>Låt oss skapa något exceptionellt.</h2>
            <a href="mailto:contact@kindstromphotos.com" class="email-link">contact@kindstromphotos.com</a>
            <p class="copyright">&copy; 2026 Kindström Photos. Alla rättigheter förbehållna.</p>
        </div>
    </footer>

</body>
</html>
