<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Kindström Photos</title>
    <meta name="description" content="Aviation photography portfolio by Anton Kindström.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Sticky Navigation (English) -->
    <header class="site-header">
        <div class="logo">KINDSTRÖM<span>PHOTOS</span></div>
        <nav class="site-nav">
            <a href="/">Home</a>
            <a href="/portfolio" style="color: var(--text-muted);">Portfolio</a> <!-- Active Page Indicator -->
            <a href="/#about">About me</a>
            <a href="/#contact">Contact</a>
            
            <!-- Language Toggle -->
            <div class="lang-toggle">
                <span class="active-lang">🇬🇧 EN</span>
                <a href="/portfolio-sv" class="lang-link">🇸🇪 SV</a>
            </div>
        </nav>
    </header>

    <main>
        <!-- Expanded Gallery Grid -->
        <section class="gallery-container" style="padding-top: 12vw;"> 
            <div class="gallery-grid">
                <!-- Massive Full-Width Feature -->
                <div class="gallery-item span-12 cinematic">
                    <span class="placeholder-text">Cinematic Wide Image</span>
                </div>
                
                <div class="gallery-item span-8 landscape">
                    <span class="placeholder-text">Landscape Image</span>
                </div>
                <div class="gallery-item span-4 portrait">
                    <span class="placeholder-text">Portrait Image</span>
                </div>
                
                <div class="gallery-item span-4 portrait">
                    <span class="placeholder-text">Portrait Image</span>
                </div>
                <div class="gallery-item span-8 landscape">
                    <span class="placeholder-text">Landscape Image</span>
                </div>
            </div>
        </section>
    </main>

    <!-- Professional CTA Footer -->
    <footer id="contact" class="site-footer">
        <div class="footer-content">
            <h2>Let's create something exceptional.</h2>
            <a href="mailto:contact@kindstromphotos.com" class="email-link">contact@kindstromphotos.com</a>
            <p class="copyright">&copy; 2026 Kindström Photos. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
